# Daily automated pipeline: Discover stores → Scrape emails → Run LLM audit → Email report
# Runs every day at 6:00 AM UTC (adjust cron as needed)

name: Daily LLM Audit Pipeline

on:
  schedule:
    - cron: '0 6 * * *'  # 6:00 AM UTC daily
  workflow_dispatch:  # Allow manual trigger
    inputs:
      from_cached_emails:
        description: 'Use cached store_emails.xlsx (skip discovery & scraping, just audit + send)'
        required: false
        default: false
        type: boolean

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # Max 6h - discovery + scrape + 100 audits can take 3-4 hours

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd ecommerce-email-scraper
          pip install -r requirements.txt

      # IMPORTANT: The combined cache action does not re-upload when there is a cache *hit*,
      # so sent_stores.json would never update. Use explicit restore + save so the log persists.
      - name: Restore sent log (dedupe)
        id: cache-sent
        uses: actions/cache/restore@v4
        with:
          path: ecommerce-email-scraper/data
          key: pipeline-sent-log-v2

      - name: Run daily pipeline
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Must be from a verified domain (resend.com/domains). onboarding@resend.dev = 403 when sending to brands.
          FROM_EMAIL: ${{ vars.FROM_EMAIL }}
          SUMMARY_EMAIL: ${{ secrets.SUMMARY_EMAIL }}
          MAX_EMAILS_PER_DAY: "100"
          # Days before the same email (or same store URL) may receive another audit email (default in script: 90)
          SENT_COOLDOWN_DAYS: "90"
        run: |
          mkdir -p ecommerce-email-scraper/data
          cd ecommerce-email-scraper
          if [ "${{ github.event.inputs.from_cached_emails }}" = "true" ] && [ -f data/store_emails.xlsx ]; then
            python daily_pipeline.py --from-excel data/store_emails.xlsx
          else
            python daily_pipeline.py --regions us uk
          fi
        continue-on-error: true  # Don't fail the workflow if pipeline has transient errors

      - name: Save sent log (always, so dedupe survives the next run)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ecommerce-email-scraper/data
          key: pipeline-sent-log-v2

      - name: Upload results (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data-${{ github.run_id }}
          path: ecommerce-email-scraper/data/
          retention-days: 7
